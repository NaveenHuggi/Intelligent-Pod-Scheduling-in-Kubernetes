apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-stress-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-stress
  template:
    metadata:
      labels:
        app: node-stress
    spec:
      nodeSelector:
        kubernetes.io/hostname: scheduler-demo-worker
      containers:
      - name: stress
        image: polinux/stress
        command: ["stress"]
        args: ["--cpu", "4", "--vm", "2", "--vm-bytes", "1024M"]
        resources:
          requests:
            cpu: "2000m"
            memory: "1024Mi"
          limits:
            cpu: "4000m"
            memory: "2048Mi"
