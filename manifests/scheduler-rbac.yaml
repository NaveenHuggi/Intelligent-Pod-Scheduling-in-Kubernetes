---
# ServiceAccount for the custom scheduler
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligent-scheduler
  namespace: scheduler-system

---
# ClusterRole: permissions needed by the scheduler
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: intelligent-scheduler-role
rules:
  # Watch and list pods (to detect unscheduled pods)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
  # Create bindings (to assign pods to nodes)
  - apiGroups: [""]
    resources: ["pods/binding", "bindings"]
    verbs: ["create"]
  # Read nodes (to get allocatable resources)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Read events (optional, for logging)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # Read metrics-server data
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: intelligent-scheduler-binding
subjects:
  - kind: ServiceAccount
    name: intelligent-scheduler
    namespace: scheduler-system
roleRef:
  kind: ClusterRole
  name: intelligent-scheduler-role
  apiGroup: rbac.authorization.k8s.io
