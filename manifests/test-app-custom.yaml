---
# Test workload using the INTELLIGENT (custom) scheduler
# Same spec as default test app — only schedulerName differs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-intelligent
  namespace: intelligent-workloads
  labels:
    app: test-app-intelligent
    scheduler-type: intelligent
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test-app-intelligent
  template:
    metadata:
      labels:
        app: test-app-intelligent
        scheduler-type: intelligent
    spec:
      schedulerName: intelligent-scheduler    # <-- uses our custom scheduler
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: test-app-intelligent-svc
  namespace: intelligent-workloads
spec:
  selector:
    app: test-app-intelligent
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
